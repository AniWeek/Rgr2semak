<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Подтверждение регистрации</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
        .header { background-color: #6366F1; color: white; padding: 20px; text-align: center; border-radius: 10px 10px 0 0; }
        .content { padding: 30px; }
        .code { font-size: 24px; font-weight: bold; color: #6366F1; text-align: center; padding: 15px; background-color: #f0f0f0; border-radius: 5px; letter-spacing: 5px; }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #666; border-top: 1px solid #ddd; }
        .warning { background-color: #fff3cd; border: 1px solid #ffeeba; color: #856404; padding: 15px; border-radius: 5px; margin: 20px 0; }
        .btn { display: inline-block; padding: 12px 24px; background-color: #6366F1; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Система тестирования</h1>
        </div>
        <div class="content">
            <h2>Здравствуйте, <span th:text="${name}">Пользователь</span>!</h2>
            <p>Спасибо за регистрацию!</p>
            <p>Ваш код подтверждения:</p>
            <div class="code" th:text="${verificationCode}">123456</div>
            <p>Или перейдите по ссылке:</p>
            <div style="text-align: center;">
                <a th:href="${verificationUrl}" class="btn">Подтвердить email</a>
            </div>
            <div class="warning">
                <strong>⚠️ Важно:</strong> Код действителен в течение 24 часов.
            </div>
        </div>
        <div class="footer">
            <p>© 2024 Система тестирования</p>
        </div>
    </div>
</body>
</html>
